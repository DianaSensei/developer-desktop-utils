name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # The Rust bin crate embeds the frontend via `generate_context!`, which
      # reads `frontendDist` (../dist) at compile time. Build the frontend first
      # so the crate (and therefore its tests) compiles.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (creates ../dist for generate_context!)
        run: npm run build

      # Tauri's system dependencies — same set the release build uses.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      # GitHub scopes Actions caches per ref: a PR can RESTORE the default
      # branch's cache, but a cache it SAVES is visible only to that PR branch
      # (never to other PRs or main). Saving on every PR therefore mints large,
      # un-shareable, instrumented-build caches that just churn the 10 GB limit
      # and evict main's useful one. So only main saves; PRs restore-only.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --lcov --output-path lcov.info

      # cargo-llvm-cov writes absolute SF: paths. Strip the workspace prefix so
      # they become repo-relative (src-tauri/src/...) and Codecov can map them to
      # files in the commit — otherwise the report is "unusable" (path mismatch).
      - name: Normalize report paths to repo root
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
