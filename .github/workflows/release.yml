name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          # - platform: ubuntu-22.04-arm
          #   args: ''
          #   rust-target: ''
          # - platform: macos-latest      # ARM runner — cross-compiles x86_64 (no Intel runner queue)
          #   args: '--target x86_64-apple-darwin'
          #   rust-target: x86_64-apple-darwin
          - platform: macos-latest      # ARM runner — native aarch64 build
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Build the release notes from GitHub's auto-generated notes (commits/PRs since
      # the previous tag). This becomes both the GitHub release body AND the updater
      # manifest `notes` field, so the in-app update popup shows the real changes.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" --jq '.body' || true)
          if [ -z "$body" ]; then
            body="See commit history for changes in this release."
          fi
          {
            echo "RELEASE_NOTES<<__NOTES_EOF__"
            echo "$body"
            echo ""
            echo "## Installation"
            echo "Download the file for your platform below:"
            echo "- **macOS (Apple Silicon)**: \`.dmg\` (aarch64)"
            echo "- **Windows**: \`.msi\` or \`.exe\` (NSIS installer)"
            echo "- **Linux**: \`.AppImage\` or \`.deb\`"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DevTool ${{ github.ref_name }}
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
