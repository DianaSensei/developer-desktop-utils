name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          # - platform: ubuntu-22.04-arm
          #   args: ''
          #   rust-target: ''
          # - platform: macos-latest      # ARM runner — cross-compiles x86_64 (no Intel runner queue)
          #   args: '--target x86_64-apple-darwin'
          #   rust-target: x86_64-apple-darwin
          - platform: macos-latest      # ARM runner — native aarch64 build
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so the changelog can diff previous→new tag

      # Derive the app version from the pushed tag (e.g. v0.2.4 -> 0.2.4) and write
      # it into the config files, so you only have to push a tag — no manual version
      # bump in tauri.conf.json. tauri-action reads the version from tauri.conf.json.
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "const f='src-tauri/tauri.conf.json',j=require('./'+f);j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const f='package.json',j=require('./'+f);j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const fs=require('fs'),f='src-tauri/Cargo.toml';let c=fs.readFileSync(f,'utf8');c=c.replace(/^version = \".*\"/m,'version = \"$VERSION\"');fs.writeFileSync(f,c)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}
          # Restore only. The cache is created/refreshed by warm-cache.yml on main;
          # a tag run can read main's cache but would otherwise save a tag-scoped
          # copy that no future tag can reuse, so we never save here.
          save-if: false

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Build the release notes from the full commit log between the previous tag
      # and this tag. This becomes both the GitHub release body AND the updater
      # manifest `notes` field, so the in-app update popup shows the real changes.
      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          NEW_TAG="${GITHUB_REF_NAME}"
          # Nearest tag reachable from this tag's parent = the previous release.
          PREV_TAG=$(git describe --tags --abbrev=0 "${NEW_TAG}^" 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${NEW_TAG}"
          else
            RANGE="${NEW_TAG}"           # first release — list the whole history
          fi

          # Every commit in the range (excluding merge commits), as "- subject (hash)".
          commits=$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE")
          [ -z "$commits" ] && commits="- No changes recorded."

          {
            echo "RELEASE_NOTES<<__NOTES_EOF__"
            echo "## Changes:"
            echo "$commits"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_ENV"

      # Windows bundling downloads WiX + NSIS (and nsis_tauri_utils.dll) into
      # %LOCALAPPDATA%\tauri on every run. Cache that dir so later releases reuse it.
      - name: Cache Tauri bundler tools (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      # Best-effort: cache Tauri's downloaded bundler tooling on Linux (AppImage
      # linuxdeploy/AppRun + plugins). Depending on the Tauri version these may be
      # fetched into the build dir instead, in which case this is a harmless no-op.
      # - name: Cache Tauri bundler tools (Linux)
      #   if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.cache/tauri
      #       ~/.local/share/tauri
      #     key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/Cargo.lock') }}
      #     restore-keys: |
      #       ${{ runner.os }}-tauri-bundler-

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DevTool ${{ github.ref_name }}
          releaseBody: ${{ env.RELEASE_NOTES }}
          # Must be published (not draft) for the updater: the endpoint
          # releases/latest/download/latest.json only resolves to the latest
          # PUBLISHED release, so drafts are invisible to the in-app updater.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
