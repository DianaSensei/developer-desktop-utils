name: Build cache (deps)

# Refreshes the Rust dependency cache on the default branch (main) so that tag
# releases (release.yml) restore it and build fast.
#
# Why this exists: GitHub scopes Actions caches per ref. A tag run can read the
# DEFAULT BRANCH's cache, but two different tags cannot read each other's. So the
# cache has to be created on main. Swatinem/rust-cache keys the cache on the
# Cargo.lock hash, so it only needs refreshing when dependencies change — which
# is exactly when this runs. Ordinary pushes (frontend, Rust logic, docs) touch
# neither file and trigger nothing. No cron.
on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/Cargo.toml'
  workflow_dispatch: {} # manual refresh if you ever need it

# Cancel an in-progress run if a newer one starts.
concurrency:
  group: build-cache
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: ''
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Same shared-key as release.yml so the cache this saves is the exact cache
      # the tag release restores. Saves on this run (main scope).
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (no bundle)
        run: npm run tauri -- build --no-bundle ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
