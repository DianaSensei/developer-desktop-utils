# Local Kafka for testing the Kafka Explorer tool.
#
#   docker compose up -d        # start broker (and seed demo topics)
#   docker compose down -v      # stop and wipe data
#
# In the Kafka tool, add a broker with Bootstrap Servers = localhost:9092
# (plaintext — no TLS/SASL, which is what the tool currently supports).
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: devtool-kafka
    ports:
      - "9092:9092"
    environment:
      # --- KRaft (no ZooKeeper) single-node combined broker + controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # --- Listeners ---
      # PLAINTEXT_HOST is what your host (and the app) connects to on localhost:9092.
      # PLAINTEXT is for any in-network clients; CONTROLLER is internal KRaft traffic.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # --- Single-node friendly replication settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 12
    volumes:
      - kafka-data:/var/lib/kafka/data

  # One-shot helper that seeds a few topics with sample messages, then exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: devtool-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        B=kafka:29092
        kafka-topics --bootstrap-server $$B --create --if-not-exists --topic demo-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server $$B --create --if-not-exists --topic user-signups --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server $$B --create --if-not-exists --topic orders --partitions 6 --replication-factor 1
        printf '{"event":"hello","n":1}\n{"event":"world","n":2}\n{"event":"kafka","n":3}\n' \
          | kafka-console-producer --bootstrap-server $$B --topic demo-events
        echo "Seed complete."
    restart: "no"

volumes:
  kafka-data:
