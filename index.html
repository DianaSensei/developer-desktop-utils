<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTool - Developer Utilities</title>
    <!-- Critical theme bootstrap: runs before first paint so the window opens in
         the correct light/dark colour with no flash of unstyled / wrong-theme
         content. Mirrors the logic in App.tsx (key: devtool-dark-mode). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('devtool-dark-mode');
          var dark = saved !== null
            ? saved === 'true'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          if (dark) root.classList.add('dark');
          root.style.colorScheme = dark ? 'dark' : 'light';
          // Paint the right background immediately, before the CSS bundle loads.
          // Colors must match the resolved --background CSS variable exactly
          // (light: hsl(0 0% 95%) = #f2f2f2, dark: hsl(0 0% 10%) = #1a1a1a) so
          // there is no background shift when the stylesheet takes over.
          root.style.backgroundColor = dark ? '#1a1a1a' : '#f2f2f2';
        } catch (e) {}
      })();
    </script>
    <style>
      /* Hard guarantee against a white flash while the JS/CSS bundles load.
         Matches the resolved --background variable to avoid a paint shift. */
      html { background-color: #f2f2f2; }
      html.dark { background-color: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
