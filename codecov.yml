# Codecov configuration.
# Coverage here measures the Rust backend (src-tauri). Much of that crate is
# Tauri command glue and network/file I/O that can't run in unit tests, so
# coverage is reported as informational — it never fails CI or blocks a PR.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

# The lcov report only contains the Rust backend (src-tauri/src), so no
# frontend ignores are needed. Exclude the Tauri entrypoint, which is plumbing
# that can't be exercised by unit tests.
ignore:
  - "src-tauri/src/main.rs"
