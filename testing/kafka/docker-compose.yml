# Local Kafka for exercising the DevTool Kafka Explorer.
#
#   cd testing/kafka && docker compose up --build
#
# Connect the tool to bootstrap servers: localhost:9092 (plaintext, no auth).
#
# Brings up:
#   - kafka     : single-node KRaft broker (no ZooKeeper), reachable at localhost:9092
#   - init      : one-shot that pre-creates the demo topics, then exits
#   - producer  : streams JSON + binary messages continuously (for realtime consume + hex)
#   - consumer  : a real consumer group ("demo-consumers") so the group views have data
name: devtool-kafka

services:
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Internal listener (other containers) + host listener (the tool on your machine).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Single-node: everything replication-factor 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      # Fixed cluster id so storage formatting is deterministic across restarts.
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  init:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        T=/opt/kafka/bin/kafka-topics.sh
        create() { "$$T" --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$1" --partitions "$$2" --replication-factor 1; }
        create demo.events 3
        create demo.json   1
        create demo.bytes  1
        create demo.rpc    1
        echo "── topics ──"
        "$$T" --bootstrap-server kafka:29092 --list
    restart: "no"

  # The producer is the sole build owner of the worker image; the consumer reuses
  # the same tag (avoids two services building the same image concurrently).
  producer:
    build: .
    image: devtool-kafka-worker
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    command: ["python", "-u", "producer.py"]
    restart: unless-stopped

  consumer:
    image: devtool-kafka-worker
    depends_on:
      producer:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      CLIENT_ID: worker-1
    command: ["python", "-u", "consumer.py"]
    restart: unless-stopped
