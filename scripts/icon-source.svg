<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E639C"/>
      <stop offset="100%" stop-color="#003F6E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!--
    macOS icon canvas guidelines: icon artwork should sit within an ~820×820
    area centred in the 1024×1024 canvas (≈10 % inset on each side).
    macOS then renders its own squircle mask and drop shadow in the clear margin.

    Transform: scale(0.8) first, then translate(102,102) → centres the 820×820 shape.
    The rx=230 corner radius scales to 184 px (22.5 % of 820) which matches
    the macOS squircle corner ratio exactly.
  -->
  <g transform="translate(102, 102) scale(0.800)">
    <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
    <rect width="1024" height="1024" rx="230" ry="230" fill="url(#shine)"/>

    <!-- > chevron -->
    <polyline
      points="192,272 456,512 192,752"
      fill="none"
      stroke="white"
      stroke-width="84"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.94"
    />
    <!-- _ dash / cursor -->
    <line
      x1="500" y1="734"
      x2="836" y2="734"
      stroke="white"
      stroke-width="74"
      stroke-linecap="round"
      opacity="0.94"
    />
  </g>
</svg>
